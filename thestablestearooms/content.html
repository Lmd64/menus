<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tom's Bar & Bistro — Menus</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" rel="stylesheet">
</head>
<body>

<nav>
  <div style="display:flex;justify-content:center;"><img src="img/logo.png" style="max-height:64px;"></div>
</nav>

<header class="site-header">
  <div class="allergens-header">
    <h1>Allergens</h1>
    <button class="allergens-toggle" aria-label="Toggle allergens filter">
      <svg class="allergens-chevron-icon" viewBox="0 0 14 9" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><polyline points="1,1 7,8 13,1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <div class="allergen-filter-wrap">
    <div class="allergen-list-padding"></div>
    <div class="allergen-filter-list">
    <span class="allergen-filter-item" data-allergen="1"><span class="item-allergen-block">1</span> Cereals containing gluten</span>
    <span class="allergen-filter-item" data-allergen="2"><span class="item-allergen-block">2</span> Crustaceans</span>
    <span class="allergen-filter-item" data-allergen="3"><span class="item-allergen-block">3</span> Eggs</span>
    <span class="allergen-filter-item" data-allergen="4"><span class="item-allergen-block">4</span> Fish</span>
    <span class="allergen-filter-item" data-allergen="5"><span class="item-allergen-block">5</span> Peanuts</span>
    <span class="allergen-filter-item" data-allergen="6"><span class="item-allergen-block">6</span> Soybeans</span>
    <span class="allergen-filter-item" data-allergen="7"><span class="item-allergen-block">7</span> Milk</span>
    <span class="allergen-filter-item" data-allergen="8"><span class="item-allergen-block">8</span> Nuts</span>
    <span class="allergen-filter-item" data-allergen="9"><span class="item-allergen-block">9</span> Celery</span>
    <span class="allergen-filter-item" data-allergen="10"><span class="item-allergen-block">10</span> Mustard</span>
    <span class="allergen-filter-item" data-allergen="11"><span class="item-allergen-block">11</span> Sesame seeds</span>
    <span class="allergen-filter-item" data-allergen="12"><span class="item-allergen-block">12</span> Sulphur dioxide &amp; sulphites</span>
    <span class="allergen-filter-item" data-allergen="13"><span class="item-allergen-block">13</span> Lupin</span>
    <span class="allergen-filter-item" data-allergen="14"><span class="item-allergen-block">14</span> Molluscs</span>
  </div>
    <div class="allergen-list-padding">
    <button class="allergen-reset-btn" hidden>&#10754;</button>
    </div>
  </div>
<!--   <span class="header-ornament">— Castle Varagh Hotel —</span>
  <h1>Tom's <span class="ampersand">&</span> Bistro</h1>
  <p class="subtitle">Townparks, Castlepollard, Co. Westmeath</p>
  <div class="header-rule"></div> -->
</header>

<div class="menus"></div><!-- /menus -->

<script src="js/render.js"></script>
<script src="js/allergens.js"></script>
</body>
</html>
